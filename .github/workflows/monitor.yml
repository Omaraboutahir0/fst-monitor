name: FST Monitor

on:
  workflow_dispatch: # Permet de le lancer manuellement à tout moment
  schedule:
    - cron: "*/15 * * * *" # ⏱️ S'exécute automatiquement toutes les 15 minutes (limite stable de GitHub)

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🔑 Autorise GitHub à enregistrer les fichiers de sauvegarde

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run monitor
        run: python monitor.py

      - name: Commit and push changes (save state)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add derniere_page.txt derniers_liens.txt || true
          git commit -m "Mise à jour de l'état des pages [skip ci]" || true
          git push || true
